services:
  - type: web
    name: furpms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: FURPMS
      - key: APP_URL
        fromService:
          type: web
          name: furpms-backend
          property: host
      - key: FRONTEND_URL
        value: https://furpms.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: "86400"
      - key: JWT_REFRESH_EXPIRY
        value: "604800"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: noreply@furpms.edu.vn
      - key: EMAIL_FROM_NAME
        value: FURPMS System
      - key: GEMINI_API_KEY
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "200"
      - key: LOG_LEVEL
        value: info
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: BASE_DAILY_SALARY
        value: "1490000"
